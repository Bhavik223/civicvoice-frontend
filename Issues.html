<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Civic Voice – Live Issues</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="images/cv-logo.png">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

/* ----- YOUR ORIGINAL CSS (UNCHANGED) ----- */

:root{
--primary:#0A2540;
--accent:#1ABC9C;
--bg:#F5F7FA;
--card:#ffffff;
--border:#e1e4e8;
--warning:#F39C12;
--success:#2ecc71;
--danger:#e74c3c;
}

body{
margin:0;
font-family:'Poppins',sans-serif;
background:var(--bg);
}

.sidebar{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:var(--primary);
color:white;
transition:.4s;
z-index:1000;
}

.sidebar.active{
left:0;
}

.sidebar-header{
text-align:center;
padding:20px;
border-bottom:1px solid rgba(255,255,255,.2);
}

.sidebar-header img{
width:60px;
border-radius:10px;
}

.sidebar ul{
list-style:none;
padding:0;
}

.sidebar ul li a{
display:block;
padding:15px 30px;
color:white;
text-decoration:none;
}

.sidebar ul li a:hover{
background:var(--accent);
}

.hamburger{
font-size:26px;
position:fixed;
top:15px;
left:15px;
cursor:pointer;
color:var(--primary);
z-index:1200;
}

.main{
padding:40px;
margin-left:0;
}

.header{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
margin-bottom:25px;
}

.search-box{
margin-bottom:20px;
}

.search-box input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid var(--border);
font-size:14px;
}

.stats{
display:flex;
gap:20px;
margin-bottom:25px;
flex-wrap:wrap;
}

.stat-card{
background:white;
padding:20px;
border-radius:12px;
flex:1;
text-align:center;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.stat-card h2{
margin:0;
color:var(--primary);
}

.issue-card{
background:white;
border-radius:14px;
overflow:hidden;
margin-bottom:25px;
box-shadow:0 6px 18px rgba(0,0,0,.1);
}

.issue-img{
width:100%;
height:220px;
object-fit:cover;
cursor:pointer;
}

.issue-body{
padding:18px;
}

.issue-body h3{
margin:0;
color:var(--primary);
}

.meta{
font-size:14px;
margin:5px 0;
}

.badge{
padding:5px 10px;
border-radius:20px;
font-size:12px;
color:white;
}

.pending{background:var(--warning);}
.progress{background:#3498db;}
.resolved{background:var(--success);}

.actions{
margin-top:10px;
display:flex;
gap:10px;
}

.btn{
padding:6px 12px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:13px;
}

.map-btn{background:#3498db;color:white;}
.vote-btn{background:var(--accent);color:white;}

footer{
background:var(--primary);
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}

</style>
</head>

<body>

<div class="sidebar" id="sidebar">

<div class="sidebar-header">
<img src="images/cv-logo.png">
<h3>Civic Voice</h3>
</div>

<ul>
<li><a href="Home.html">Home</a></li>
<li><a href="Report.html">Report Issue</a></li>
<li><a href="Issues.html">Live Issues</a></li>
<li><a href="Profile.html">Profile</a></li>

<li id="adminLink" style="display:none">
<a href="admin.html">Admin Panel</a>
</li>

</ul>
</div>

<div class="hamburger" onclick="toggleSidebar()">☰</div>

<div class="main">

<div class="header">
<h1>Live Civic Issues</h1>
<p>See problems reported by citizens</p>
</div>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Search issues...">
</div>

<div class="stats">

<div class="stat-card">
<h2 id="totalIssues">0</h2>
<p>Total Issues</p>
</div>

<div class="stat-card">
<h2 id="pendingIssues">0</h2>
<p>Pending</p>
</div>

<div class="stat-card">
<h2 id="resolvedIssues">0</h2>
<p>Resolved</p>
</div>

</div>

<div id="issuesContainer"></div>

</div>

<footer>
  <img src="images/cv-logo.png" alt="Civic Voice Logo" style="width:30px;height:30px;vertical-align:middle;">
  Civic Voice © 2026 | Professional Government Portal
</footer>
<script>

const API="https://civic-voice-backend-1.onrender.com";

let issues=[];

/* SIDEBAR */

function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("active");
}

/* ADMIN CHECK */

fetch(API+"/api/auth/me")
.then(res=>res.json())
.then(data=>{
if(data.user && data.user.role==="admin"){
document.getElementById("adminLink").style.display="block";
}
})
.catch(()=>{});

/* LOAD ISSUES */

function loadIssues(){

fetch(API+"/api/issues")

.then(res=>res.json())

.then(data=>{

issues = data || [];

updateStats();

renderIssues(issues);

})

.catch(err=>console.error("Issue load error:",err));

}

window.onload=loadIssues;

/* STATS */

function updateStats(){

document.getElementById("totalIssues").innerText = issues.length;

document.getElementById("pendingIssues").innerText =
issues.filter(i => i.status === "Pending").length;

document.getElementById("resolvedIssues").innerText =
issues.filter(i => i.status === "Resolved").length;

}

/* RENDER */

function renderIssues(list){

const container=document.getElementById("issuesContainer");

container.innerHTML="";

list.forEach(issue=>{

let statusClass="pending";

if(issue.status==="Resolved") statusClass="resolved";
if(issue.status==="In Progress") statusClass="progress";

let card=document.createElement("div");

card.className="issue-card";

card.innerHTML=`

<img class="issue-img"
src="${issue.photo ? API + issue.photo : 'https://via.placeholder.com/600x220'}"
onclick="zoomImage(this.src)">

<div class="issue-body">

<h3>${issue.category}</h3>

<p class="meta">
<b>Location:</b> ${issue.location}
</p>

<p class="meta">
<b>Status:</b> <span class="badge ${statusClass}">
${issue.status}
</span>
</p>

<p class="meta">
${issue.description}
</p>

<div class="actions">

<button class="btn map-btn"
onclick="openMap('${issue.location}')">
📍 Map
</button>

<button class="btn vote-btn"
onclick="voteIssue()">
👍 Support
</button>

</div>

</div>
`;

container.appendChild(card);

});

}

/* MAP */

function openMap(loc){

window.open(
"https://www.google.com/maps/search/"+encodeURIComponent(loc),
"_blank"
);

}

/* SEARCH */

document.getElementById("searchInput")
.addEventListener("input",function(){

let q=this.value.toLowerCase();

let filtered = issues.filter(i =>

(i.category || "").toLowerCase().includes(q) ||
(i.location || "").toLowerCase().includes(q)

);

renderIssues(filtered);

});

/* IMAGE ZOOM */

function zoomImage(src){

let win=window.open("");

win.document.write(`<img src="${src}" style="width:100%">`);

}

/* VOTE */

function voteIssue(){

alert("Thanks for supporting this issue 👍");

}

/* AUTO REFRESH */

setInterval(loadIssues,15000);

</script>

</body>
</html>
