<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Civic Voice – Report Civic Issue</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

:root{
--primary:#0A2540;
--accent:#1ABC9C;
--bg:#F5F7FA;
--card:#ffffff;
--border:#e1e4e8;
--warning:#F39C12;
--text-light:#fff;
}

body{
margin:0;
font-family:'Poppins',sans-serif;
background:var(--bg);
overflow-x:hidden;
}

.sidebar{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:var(--primary);
color:white;
transition:left .4s;
z-index:1000;
}

.sidebar.active{
left:0;
}

.sidebar-header{
text-align:center;
padding:20px 0;
border-bottom:1px solid rgba(255,255,255,.2);
}

.sidebar-header img{
width:60px;
border-radius:12px;
}

.sidebar ul{
list-style:none;
padding:0;
margin-top:20px;
}

.sidebar ul li a{
display:block;
padding:15px 30px;
color:white;
text-decoration:none;
}

.sidebar ul li a:hover{
background:var(--accent);
}

.hamburger{
font-size:28px;
cursor:pointer;
position:fixed;
top:15px;
left:15px;
color:var(--primary);
z-index:1100;
}

.main{
margin-left:0;
padding:40px;
}

.header{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 4px 15px rgba(0,0,0,.08);
margin-bottom:30px;
}

.header h1{
margin:0;
color:var(--primary);
}

.form-card{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 4px 20px rgba(0,0,0,.1);
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

label{
font-weight:600;
}

input,select,textarea{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid var(--border);
margin-top:6px;
}

textarea{
grid-column:1/3;
height:120px;
}

button{
margin-top:20px;
background:var(--accent);
border:none;
color:white;
padding:14px 30px;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#16a085;
}

footer{
background:var(--primary);
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}

@media(max-width:800px){
.form-grid{
grid-template-columns:1fr;
}

textarea{
grid-column:1;
}
}

</style>
</head>

<body>

<div class="sidebar" id="sidebar">

<div class="sidebar-header">
<img src="images/cv-logo.png" style="width:60px;height:60px;display:block;margin:0 auto;">
<h2>Civic Voice</h2>
</div>

<ul>
<li><a href="Home.html">Home</a></li>
<li><a href="Report.html">Report Issue</a></li>
<li><a href="Issues.html">Live Issues</a></li>
<li><a href="Profile.html">My Profile</a></li>
<li id="adminLink" style="display:none"><a href="admin.html">Admin Panel</a></li>
</ul>

</div>

<div class="hamburger" onclick="toggleSidebar()">☰</div>
<div class="topbar">

<button id="loginBtn" onclick="location.href='login.html'">Login</button>

<button id="logoutBtn" onclick="logout()" style="display:none;">
Logout
</button>

</div>
<div class="main">

<div class="header">
<h1>Report a Civic Issue</h1>
<p>Fill this form to notify the Municipal Authority</p>
</div>

<div class="form-card">

<div class="form-grid">

<div>
<label>Your Full Name</label>
<input id="name" type="text" placeholder="Enter your name">
</div>

<div>
<label>Location</label>
<input id="location" type="text" placeholder="Area / Street / Ward">
</div>

<div>
<label>Issue Category</label>
<select id="category">
<option>Select Category</option>
<option>Road Damage</option>
<option>Garbage Problem</option>
<option>Water Leakage</option>
<option>Street Light</option>
<option>Drainage</option>
</select>
</div>

<!-- ONLY CHANGE IS HERE -->
<div>
<label>Upload Photo Evidence</label>
<input type="file" name="photo" id="photo">
</div>

<div style="grid-column:1/3">
<label>Describe the Problem</label>
<textarea id="details"></textarea>
</div>

</div>

<button onclick="submitComplaint()">Submit Complaint</button>

</div>

</div>

<footer>
<img src="images/cv-logo.png" style="width:30px;height:30px;vertical-align:middle;">
Civic Voice © 2026 | Professional Government Portal
</footer>
<script>

const API_URL="https://civic-voice-backend-1.onrender.com";

/* LOGIN TOGGLE */
fetch(API_URL+"/api/auth/check",{credentials:"include"})
.then(res=>res.json())
.then(data=>{
if(data.loggedIn){
  document.getElementById("loginBtn").style.display="none";
  document.getElementById("logoutBtn").style.display="inline-block";
}else{
  document.getElementById("loginBtn").style.display="inline-block";
  document.getElementById("logoutBtn").style.display="none";
}

if(data.loggedIn && data.user?.role==="admin"){
  document.getElementById("adminLink").style.display="block";
}
});

/* SIDEBAR */
function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("active");
}

/* GEO LOCATION */
let latitude=null;
let longitude=null;

if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(

function(position){
  latitude = position.coords.latitude;
  longitude = position.coords.longitude;
},

function(error){
  alert("⚠️ Location permission denied. Please enable GPS.");
}

);
}

/* LOGOUT */
function logout(){
fetch(API_URL+"/api/auth/logout",{
method:"POST",
credentials:"include"
});
window.location.href="login.html";
}

/* SUBMIT ISSUE */
function submitComplaint(){

const name=document.getElementById("name").value.trim();
const location=document.getElementById("location").value.trim();
const category=document.getElementById("category").value;
const description=document.getElementById("details").value.trim();

const fileInput=document.getElementById("photo");
const photo=fileInput.files[0];
console.log("LAT:", latitude, "LNG:", longitude);
if(!name || !location || !description || category==="Select Category"){
  alert("Please fill all fields");
return;
}

const formData=new FormData();

formData.append("name",name);
formData.append("location",location);
formData.append("category",category);
formData.append("description",description);
if(latitude !== null && longitude !== null){
  formData.append("latitude", latitude);
  formData.append("longitude", longitude);
}else{
  alert("⚠️ Please allow location access for accurate map pin");
  return;
}

if(photo){
formData.append("photo",photo);
}

fetch(API_URL+"/api/issues",{
method:"POST",
credentials:"include",
body:formData
})
.then(async res=>{
const data=await res.json();

if(!res.ok){
throw new Error(data.message || "Server error");
}

return data;
})
.then(data=>{

alert("✅ Complaint submitted successfully!");

document.getElementById("name").value="";
document.getElementById("location").value="";
document.getElementById("category").selectedIndex=0;
document.getElementById("details").value="";
fileInput.value="";

})
.catch(err=>{
console.error(err);
alert(err.message);
});

}

</script>

</body>
</html>
