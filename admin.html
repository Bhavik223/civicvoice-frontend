<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login – Civic Voice</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  background:#0A2540;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Poppins,sans-serif;
}

.login-box{
  background:white;
  padding:40px;
  border-radius:15px;
  width:350px;
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  margin:15px 0;
  border-radius:8px;
}

button{
  width:100%;
  background:#1ABC9C;
  color:white;
  border:none;
  padding:12px;
  border-radius:8px;
}

#msg{color:red;}
</style>
</head>

<body>

<div class="login-box">
  <h2>🏛 Admin Login</h2>

  <input id="user" placeholder="Email">
  <input id="pass" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
  <p id="msg"></p>
</div>

<script>
const API="https://civic-voice-backend-1.onrender.com";

function login(){

const email=document.getElementById("user").value.trim();
const password=document.getElementById("pass").value.trim();
const msg=document.getElementById("msg");

if(!email || !password){
msg.innerText="Enter details";
return;
}

fetch(API+"/api/auth/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
credentials:"include",
body:JSON.stringify({email,password})
})
.then(res=>res.json())
.then(data=>{

if(data.role==="admin"){
window.location.href="admin.html";
}else{
msg.innerText="Not an admin";
}

})
.catch(()=>{
msg.innerText="Server error";
});

}
</script>

</body>
</html>
