<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard – Civic Voice</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Poppins,sans-serif;
background:#F5F7FA;
padding:20px;
}

.issue{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

button{
margin:5px;
padding:8px 12px;
border:none;
border-radius:6px;
background:#1ABC9C;
color:white;
cursor:pointer;
}

img{
margin-top:10px;
border-radius:8px;
}
</style>
</head>

<body>

<h1>🛠 Admin Dashboard</h1>

<div id="adminIssues"></div>

<script>

const API="https://civic-voice-backend-1.onrender.com";

/* PROTECT PAGE */
fetch(API+"/api/auth/check",{credentials:"include"})
.then(res=>res.json())
.then(data=>{
if(!data.loggedIn || data.user.role!=="admin"){
alert("Access denied");
window.location.href="admin-login.html";
}
});

/* LOAD ISSUES */
function loadAdminIssues(){

fetch(API+"/api/admin/all",{credentials:"include"})
.then(res=>res.json())
.then(issues=>{

const box=document.getElementById("adminIssues");
box.innerHTML="";

issues.forEach(issue=>{

let img = issue.photo
? (issue.photo.startsWith("http") ? issue.photo : API+issue.photo)
: "";

box.innerHTML+=`
<div class="issue">

<h3>${issue.category}</h3>

<p><b>📍 ${issue.location}</b></p>

<p>${issue.description}</p>

<p>Status: <b>${issue.status}</b></p>

${img ? `<img src="${img}" width="150">` : ""}

<br>

<button onclick="updateStatus('${issue._id}','Resolved')">
Resolve
</button>

<button onclick="updateStatus('${issue._id}','Pending')">
Pending
</button>

</div>
`;

});

});

}

/* UPDATE STATUS */
function updateStatus(id,status){

fetch(API+"/api/admin/status/"+id,{
method:"PUT",
headers:{"Content-Type":"application/json"},
credentials:"include",
body:JSON.stringify({status})
})
.then(()=>{
alert("Updated ✅");
loadAdminIssues();
});

}

/* LOAD DATA */
loadAdminIssues();

</script>

</body>
</html>
